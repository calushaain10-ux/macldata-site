<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - Michael Data Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
  body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #0b3d91, #1e40af, #10b981);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
  }

  .thank-you-container {
    text-align: center;
    background: rgba(0,0,0,0.5);
    padding: 50px 30px;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
    position: relative;
    z-index: 1;
    max-width: 550px;
  }

  h1 {
    font-size: 3em;
    margin: 0 0 20px 0;
    background: linear-gradient(90deg, #FFD700, #FF4500, #10b981, #F472B6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 2s linear infinite;
  }

  @keyframes shine {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
  }

  p {
    font-size: 1.2em;
    margin: 10px 0 30px 0;
    color: #f0f0f0;
  }

  .home-btn {
    padding: 15px 40px;
    font-size: 1.2em;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: linear-gradient(90deg, #FF4500, #FFD700, #10b981, #6366F1);
    color: white;
    transition: 0.4s;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5), 0 0 10px #FFD700;
  }

  .home-btn:hover {
    transform: scale(1.15);
    box-shadow: 0 10px 25px rgba(0,0,0,0.6), 0 0 20px #FFD700;
  }

  /* Confetti style */
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0.8;
    top: 0;
    pointer-events: none;
    z-index: 0;
    border-radius: 50%;
  }

  /* Canvas for fireworks */
  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
  }
</style>
</head>
<body>

<div class="thank-you-container">
  <h1>Thank You!</h1>
  <p>Your order has been successfully placed. We appreciate your trust!</p>
  <button class="home-btn" onclick="goHome()">Go Back Home</button>
</div>

<canvas id="fireworks"></canvas>

<script>
  // ================= CONFETTI =================
  const colors = ['#FFD700','#FF4500','#10b981','#6366F1','#F472B6'];
  function createConfetti() {
    const confetti = document.createElement('div');
    confetti.classList.add('confetti');
    confetti.style.left = Math.random() * window.innerWidth + 'px';
    confetti.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
    confetti.style.width = confetti.style.height = Math.random() * 10 + 5 + 'px';
    document.body.appendChild(confetti);

    let top = 0;
    const fall = setInterval(() => {
      top += Math.random() * 5 + 2;
      confetti.style.top = top + 'px';
      confetti.style.transform = `rotate(${top*5}deg)`;
      if(top > window.innerHeight){
        clearInterval(fall);
        confetti.remove();
      }
    }, 20);
  }

  setInterval(createConfetti, 150);

  // ================= FIREWORKS =================
  const canvas = document.getElementById('fireworks');
  const ctx = canvas.getContext('2d');
  let cw = canvas.width = window.innerWidth;
  let ch = canvas.height = window.innerHeight;
  let fireworks = [];
  let particles = [];

  function random(min, max){ return Math.random()*(max-min)+min; }

  window.addEventListener('resize', () => { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; });

  class Firework {
    constructor(sx, sy, tx, ty){
      this.x = sx; this.y = sy;
      this.sx = sx; this.sy = sy;
      this.tx = tx; this.ty = ty;
      this.distanceToTarget = Math.hypot(tx-sx, ty-sy);
      this.distanceTraveled = 0;
      this.coordinates = [];
      this.coordinateCount = 3;
      while(this.coordinateCount--) this.coordinates.push([this.x,this.y]);
      this.angle = Math.atan2(ty - sy, tx - sx);
      this.speed = 5;
      this.acceleration = 1.05;
      this.brightness = random(50,70);
    }
    update(index){
      this.coordinates.pop();
      this.coordinates.unshift([this.x,this.y]);
      this.speed *= this.acceleration;
      let vx = Math.cos(this.angle)*this.speed;
      let vy = Math.sin(this.angle)*this.speed;
      this.distanceTraveled = Math.hypot(this.x+vx - this.sx, this.y+vy - this.sy);
      if(this.distanceTraveled >= this.distanceToTarget){
        createParticles(this.tx,this.ty);
        fireworks.splice(index,1);
      } else {
        this.x += vx; this.y += vy;
      }
    }
    draw(){
      ctx.beginPath();
      ctx.moveTo(this.coordinates[this.coordinates.length-1][0], this.coordinates[this.coordinates.length-1][1]);
      ctx.lineTo(this.x,this.y);
      ctx.strokeStyle = `hsl(${random(0,360)},100%,${this.brightness}%)`;
      ctx.stroke();
    }
  }

  class Particle {
    constructor(x,y){
      this.x = x; this.y = y;
      this.coordinates = [];
      this.coordinateCount = 5;
      while(this.coordinateCount--) this.coordinates.push([this.x,this.y]);
      this.angle = random(0,Math.PI*2);
      this.speed = random(1,10);
      this.friction = 0.95;
      this.gravity = 1;
      this.hue = random(0,360);
      this.brightness = random(50,80);
      this.alpha = 1;
      this.decay = random(0.015,0.03);
    }
    update(index){
      this.coordinates.pop();
      this.coordinates.unshift([this.x,this.y]);
      this.speed *= this.friction;
      this.x += Math.cos(this.angle)*this.speed;
      this.y += Math.sin(this.angle)*this.speed + this.gravity;
      this.alpha -= this.decay;
      if(this.alpha <= 0){
        particles.splice(index,1);
      }
    }
    draw(){
      ctx.beginPath();
      ctx.moveTo(this.coordinates[this.coordinates.length-1][0], this.coordinates[this.coordinates.length-1][1]);
      ctx.lineTo(this.x,this.y);
      ctx.strokeStyle = `hsla(${this.hue},100%,${this.brightness}%,${this.alpha})`;
      ctx.stroke();
    }
  }

  function createParticles(x,y){
    let particleCount = 30;
    while(particleCount--) particles.push(new Particle(x,y));
  }

  function loop(){
    requestAnimationFrame(loop);
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,cw,ch);
    ctx.globalCompositeOperation = 'lighter';

    let i = fireworks.length;
    while(i--){
      fireworks[i].draw();
      fireworks[i].update(i);
    }

    let j = particles.length;
    while(j--){
      particles[j].draw();
      particles[j].update(j);
    }
  }

  setInterval(() => {
    fireworks.push(new Firework(cw/2, ch, random(0,cw), random(0,ch/2)));
  }, 800);

  loop();

  // ================= BUTTON =================
  function goHome(){
    window.location.href = "index.html"; // change this to your home page
  }

</script>
</body>
</html>
