<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Michael Data Hub</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0f172a;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#1e293b;
padding:10px;
display:flex;
justify-content:center;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.container{
padding:20px;
text-align:center;
}

.card{
background:white;
padding:20px;
margin:15px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
display:inline-block;
width:200px;
}

button{
background:#10b981;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

#ai-button{
position:fixed;
bottom:20px;
right:20px;
background:#10b981;
color:white;
border-radius:50%;
width:60px;
height:60px;
font-size:22px;
}

#ai-box{
position:fixed;
bottom:90px;
right:20px;
width:300px;
height:400px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
display:none;
flex-direction:column;
}

#ai-messages{
flex:1;
padding:10px;
overflow-y:auto;
font-size:14px;
}

#ai-input{
display:flex;
border-top:1px solid #ccc;
}

#ai-input input{
flex:1;
padding:10px;
border:none;
}

#ai-input button{
background:#10b981;
border:none;
color:white;
padding:10px;
}

#whatsapp{
display:inline-block;
margin-top:10px;
color:#10b981;
font-weight:bold;
}
</style>

</head>

<body>

<header>
<h2>Michael Data Hub</h2>
<p>Fast & Affordable Data Bundles</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">My Orders</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<h3>Choose Network</h3>

<div class="card">
<h3>MTN</h3>
<p>Buy MTN Data</p>
<button onclick="alert('Select bundle to continue')">Buy</button>
</div>

<div class="card">
<h3>Vodafone</h3>
<p>Buy Vodafone Data</p>
<button onclick="alert('Select bundle to continue')">Buy</button>
</div>

<div class="card">
<h3>AirtelTigo</h3>
<p>Buy AirtelTigo Data</p>
<button onclick="alert('Select bundle to continue')">Buy</button>
</div>

<br><br>

<a href="https://chat.whatsapp.com/LHlJoeh3RJYHvOaExsYox7?mode=gi_t" target="_blank" id="whatsapp">
Join Our WhatsApp Group
</a>

<p>Contact: 0536576713</p>

</div>

<button id="ai-button" onclick="toggleAI()">AI</button>

<div id="ai-box">

<div id="ai-messages"></div>

<div id="ai-input">
<input id="ai-text" placeholder="Ask something...">
<button onclick="sendAIMessage()">Send</button>
</div>

</div>

<script>

function toggleAI(){
const box=document.getElementById("ai-box");
box.style.display=(box.style.display==="flex")?"none":"flex";

const messages=document.getElementById("ai-messages");

if(messages.innerHTML===""){
const msg=document.createElement("div");
msg.innerHTML="AI: Hello 👋 How may I help you today?";
msg.style.margin="5px 0";
messages.appendChild(msg);
}
}

function sendAIMessage(){

const input=document.getElementById("ai-text");
const text=input.value.trim().toLowerCase();
if(!text) return;

const messages=document.getElementById("ai-messages");

const user=document.createElement("div");
user.style.textAlign="right";
user.innerText="You: "+text;
user.style.margin="5px 0";
messages.appendChild(user);

input.value="";

setTimeout(()=>{

let reply="AI: I’m not sure about that. Please send your issue to this email: <a href='mailto:Mac.calusha10@gmail.com'>Mac.calusha10@gmail.com</a> and the admin will assist you.";

if(text.includes("mtn"))
reply="AI: To buy MTN bundle, click the MTN card and choose the data size.";

else if(text.includes("vodafone"))
reply="AI: To buy Vodafone bundle, click the Vodafone card and choose your bundle.";

else if(text.includes("price") || text.includes("bundle"))
reply="AI: Bundle prices will appear when you select the network.";

else if(text.includes("pay") || text.includes("payment"))
reply="AI: Click the Pay button and complete payment securely.";

else if(text.includes("delay") || text.includes("time") || text.includes("deliver"))
reply="AI: Please be patient. Data delivery takes between 10 minutes and 4 hours.";

else if(text.includes("contact"))
reply="AI: You can contact the admin on WhatsApp group or send email to <a href='mailto:Mac.calusha10@gmail.com'>Mac.calusha10@gmail.com</a>";

const ai=document.createElement("div");
ai.innerHTML=reply;
ai.style.margin="5px 0";

messages.appendChild(ai);

messages.scrollTop=messages.scrollHeight;

},700);

}

/* Keep login after refresh example */

if(localStorage.getItem("loggedIn")==="true"){
console.log("User still logged in");
}

</script>

</body>
</html>
