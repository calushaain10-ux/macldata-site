<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michael Data Hub</title>
<style>
  body {margin:0;font-family: Arial;background: linear-gradient(to bottom,#0b3d91,#1e40af,#0f172a);color:white;text-align:center;}
  .container{padding:20px;}
  h1{margin-top:20px;}
  .card-container{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin-top:30px;}
  .card{
    border-radius:15px;padding:15px;width:220px;cursor:pointer;transition: transform 0.3s;text-align:center;
    font-weight:bold;color:white;font-size:18px;
  }
  .mtn{background:#FFD700;} /* MTN Yellow */
  .vodafone{background:#E60000;} /* Vodafone Red */
  .card:hover{transform:scale(1.05);}
  select,input,button{
    width:90%;padding:10px;margin-top:10px;border:none;border-radius:8px;font-size:16px;
  }
  button{background:#10b981;color:white;cursor:pointer;}
  #dashboard{margin-top:20px;background:rgba(255,255,255,0.1);padding:15px;border-radius:10px;text-align:left;}
  #dashboard h3{margin:5px;}
  #orders-list li{padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.2);cursor:pointer;}
  #whatsapp-btn{
    position: fixed; bottom: 20px; right: 20px;
    background:#25D366; color:white; border:none; padding:15px; border-radius:50%; font-size:20px; cursor:pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  #delivery-note{
    color:#FFD700;
    font-weight:bold;
    margin-top:10px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Michael Data Hub</h1>
  <p>Buy MTN & Vodafone Bundles Easily</p>

  <!-- Login / Signup -->
  <div id="auth-section">
    <input type="email" id="email" placeholder="Email (optional)">
    <input type="password" id="password" placeholder="Password (optional)">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="guest()">Continue as Guest</button>
    <p id="auth-message"></p>
  </div>

  <!-- Network Selection -->
  <div class="card-container" id="network-section" style="display:none;">
    <div class="card mtn" onclick="selectNetwork('MTN')">MTN Network</div>
    <div class="card vodafone" onclick="selectNetwork('VODAFONE')">Vodafone Network</div>
  </div>

  <!-- Bundle Selection -->
  <div id="bundle-section" style="display:none;margin-top:30px;">
    <h2 id="network-title">Bundles</h2>
    <select id="bundle-select"></select>
    <input type="text" id="phone" placeholder="Enter your phone number">
    
    <!-- Delivery time notice -->
    <p id="delivery-note">Note: Data bundles are delivered within 10 minutes to 4 hours.</p>
    
    <button onclick="pay()">Pay Now</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none;">
    <h3>Recent Orders</h3>
    <ul id="orders-list"></ul>
  </div>
</div>

<!-- WhatsApp Contact Button -->
<button id="whatsapp-btn" onclick="contactWhatsApp()">💬</button>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<!-- Paystack -->
<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDkzHecsD8_BMEKfkrt9d-EZB2Zk3VCwLc",
    authDomain: "michael-data-hub-b5824.firebaseapp.com",
    projectId: "michael-data-hub-b5824",
    storageBucket: "michael-data-hub-b5824.firebasestorage.app",
    messagingSenderId: "156026253962",
    appId: "1:156026253962:web:9cf3c5cfe2de9c18373373"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let selectedNetwork = '';
  const mtnBundles = [];
  const vodafoneBundles = [];

  // MTN 1GB → 100GB, price = 5.3 * GB
  for(let i=1;i<=100;i++){
    const price = (5.3*i).toFixed(2);
    mtnBundles.push({size:i+"GB",price:price});
  }

  // Vodafone 5GB → 50GB, 5GB step, price = 5.3 * GB
  for(let i=5;i<=50;i+=5){
    const price = (5.3*i).toFixed(2);
    vodafoneBundles.push({size:i+"GB",price:price});
  }

  // Signup
  function signup(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    if(!email || !password){
      document.getElementById("auth-message").innerText = "Email and password required for sign-up.";
      return;
    }
    auth.createUserWithEmailAndPassword(email,password)
      .then(userCredential=>{
        currentUser = userCredential.user;
        document.getElementById("auth-section").style.display="none";
        document.getElementById("network-section").style.display="flex";
        loadOrders();
      })
      .catch(error=>document.getElementById("auth-message").innerText=error.message);
  }

  // Login
  function login(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    if(!email || !password){
      document.getElementById("auth-message").innerText = "Email and password required for login.";
      return;
    }
    auth.signInWithEmailAndPassword(email,password)
      .then(userCredential=>{
        currentUser = userCredential.user;
        document.getElementById("auth-section").style.display="none";
        document.getElementById("network-section").style.display="flex";
        loadOrders();
      })
      .catch(error=>document.getElementById("auth-message").innerText=error.message);
  }

  // Guest
  function guest(){
    currentUser = {uid:"guest"};
    document.getElementById("auth-section").style.display="none";
    document.getElementById("network-section").style.display="flex";
    loadOrders();
  }

  // Network select
  function selectNetwork(network){
    selectedNetwork = network;
    document.getElementById("bundle-section").style.display='block';
    document.getElementById("network-title").innerText = network + " Bundles";
    const select = document.getElementById("bundle-select");
    select.innerHTML="";
    const bundles = network==="MTN"?mtnBundles:vodafoneBundles;
    bundles.forEach(b=>{
      const option = document.createElement("option");
      option.value = b.price;
      option.text = `${b.size} - GHC ${b.price}`;
      select.appendChild(option);
    });
  }

  // Paystack payment
  function pay(){
    const phone = document.getElementById("phone").value.trim() || "0541712051";
    const amount = document.getElementById("bundle-select").value * 100; // in Kobo
    const handler = PaystackPop.setup({
      key: 'pk_test_8f766e087751fca611df11cfe5ae5c86ece075ee',
      email: currentUser && currentUser.email ? currentUser.email : 'guest@example.com',
      amount: amount,
      currency: 'GHS',
      ref: ''+Math.floor((Math.random()*1000000000)+1),
      metadata:{
        custom_fields:[
          {display_name:"Phone Number", variable_name:"phone_number", value:phone}
        ]
      },
      callback:function(response){
        saveOrder(phone,selectedNetwork,document.getElementById("bundle-select").selectedOptions[0].text,response.reference);
        window.location.href="thankyou.html";
      },
      onClose:function(){alert('Transaction was not completed.');}
    });
    handler.openIframe();
  }

  // Save order to Firestore
  function saveOrder(phone,network,bundle,ref){
    db.collection("orders").add({
      userId: currentUser.uid,
      phone: phone,
      network: network,
      bundle: bundle,
      reference: ref,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>loadOrders());
  }

  // Live dashboard
  function loadOrders(){
    if(!currentUser || currentUser.uid==="guest"){
      document.getElementById("dashboard").style.display="none";
      return;
    }
    document.getElementById("dashboard").style.display="block";
    const ordersList = document.getElementById("orders-list");
    
    db.collection("orders")
      .where("userId","==",currentUser.uid)
      .orderBy("timestamp","desc")
      .onSnapshot(snapshot=>{
        ordersList.innerHTML="";
        if(snapshot.empty){
          const li = document.createElement("li");
          li.innerText="No orders yet.";
          ordersList.appendChild(li);
          return;
        }
        snapshot.forEach(doc=>{
          const data = doc.data();
          const li = document.createElement("li");
          const date = data.timestamp ? data.timestamp.toDate().toLocaleString() : "";
          li.innerText = `${data.network} - ${data.bundle} | Phone: ${data.phone} | ${date}`;
          li.onclick = ()=>alert(`Order Ref: ${data.reference}\nNetwork: ${data.network}\nBundle: ${data.bundle}\nPhone: ${data.phone}\nTime: ${date}`);
          ordersList.appendChild(li);
        });
      });
  }

  // WhatsApp Contact
  function contactWhatsApp(){
    window.open('https://wa.me/0541712051', '_blank');
  }
</script>
</body>
</html>
